<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            background: #000000;
            color: #f7f7f7;
            font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .history-header {
            position: relative;
            display: flex;
            align-items: center;
            padding: 38px 20px 0 10px;
            height: 68px;
            background: #08090C;
            -webkit-app-region: drag;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-left .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            -webkit-app-region: no-drag;
            border-radius: 6px;
            transition: background 0.15s, color 0.15s;
        }

        .header-left .icon-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .header-title {
            font-size: 15px;
            font-weight: 500;
            color: #fff;
        }

        .header-right {
            position: absolute;
            top: 21px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-secondary {
            -webkit-app-region: no-drag;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 14px;
            height: 36px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: -0.02em;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.35);
        }

        .btn-secondary.chat-redirecting {
            border-color: rgba(255, 255, 255, 0.35);
            color: rgba(255, 255, 255, 0.6);
        }

        .btn-secondary svg {
            flex-shrink: 0;
        }


        /* ── Content area ── */
        .history-content {
            flex: 1;
            display: flex;
            padding: 10px;
            gap: 10px;
            overflow: hidden;
            background: #000000;
        }

        /* ── Sidebar ── */
        .history-sidebar {
            display: flex;
            flex-direction: column;
            width: 360px;
            min-width: 360px;
            background: #0F1015;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        .sidebar-toolbar {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            gap: 8px;
        }

        .search-bar {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 10px;
            height: 36px;
            background: #000000;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            gap: 8px;
        }

        .search-bar img {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            opacity: 0.7;
        }

        .search-bar input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #fff;
            font-family: inherit;
            font-size: 13px;
        }

        .search-bar input::placeholder {
            color: #969696;
        }

        .sort-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 0 12px;
            height: 36px;
            background: #191B23;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: -0.02em;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .sort-btn:hover {
            background: #22242e;
        }

        .sort-btn svg {
            flex-shrink: 0;
        }

        /* ── Sort dropdown ── */
        .sort-dropdown-wrap {
            position: relative;
        }

        .sort-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            width: 224px;
            background: #08090C;
            border: 1px solid rgba(239, 239, 239, 0.05);
            box-shadow: 0px 17px 17px rgba(0, 0, 0, 0.12), 0px 4px 9px rgba(0, 0, 0, 0.14);
            border-radius: 12px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            opacity: 0;
            transform: translateY(-4px);
            pointer-events: none;
            transition: opacity 0.15s ease, transform 0.15s ease;
            z-index: 100;
        }

        .sort-dropdown.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .sort-section-header {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            height: 36px;
            background: rgba(239, 239, 239, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
        }

        .sort-options {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sort-option {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.12s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }

        .sort-option:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .sort-radio {
            width: 16px;
            height: 16px;
            border-radius: 999px;
            border: 2px solid #2F2F2F;
            box-sizing: border-box;
            flex-shrink: 0;
            transition: border-color 0.15s, border-width 0.15s;
        }

        .sort-option.active .sort-radio {
            border: 4px solid #EC5B16;
        }

        .sort-option-label {
            font-size: 14px;
            font-weight: 500;
            color: #F7F7F7;
            letter-spacing: 0.005em;
        }

        .sort-option.disabled {
            opacity: 0.35;
            cursor: default;
        }

        .sort-option.disabled:hover {
            background: none;
        }

        /* ── Video list ── */
        .video-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .video-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
            border: 1px solid transparent;
            gap: 10px;
        }

        .video-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .video-item.active {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .video-item-details {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .video-item-title {
            font-size: 14px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.898);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 22px;
        }

        .video-item-time {
            font-size: 12px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.698);
            line-height: 17px;
        }

        /* ── Status badges ── */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 6px 2px 4px;
            border-radius: 36px;
            font-size: 12px;
            font-weight: 500;
            line-height: 150%;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .status-badge .status-icon {
            width: 12px;
            height: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-badge .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        .status-done {
            background: rgba(0, 255, 189, 0.1);
            color: #00B686;
        }
        .status-done .status-dot { background: #00B686; }

        .status-processing {
            background: rgba(251, 232, 48, 0.1);
            color: #D7C300;
        }
        .status-processing .status-dot { background: #D7C300; }

        .status-recording {
            background: rgba(134, 55, 251, 0.1);
            color: #8B3DFF;
        }
        .status-recording .status-dot { background: #8954D7; }

        .status-error {
            background: rgba(255, 54, 54, 0.1);
            color: #EF3535;
        }
        .status-error .status-dot { background: #EF3535; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        .status-recording .status-dot,
        .status-processing .status-dot {
            animation: pulse 2s ease-in-out infinite;
        }

        /* ── Player area ── */
        .player-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #08090C;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            overflow: hidden;
        }

        .player-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            background: #0F1015;
            flex-shrink: 0;
        }

        .player-header-left {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .player-title {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .edit-name-btn {
            background: none;
            border: none;
            color: #969696;
            cursor: pointer;
            padding: 3px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s;
            flex-shrink: 0;
        }

        .player-header-left:hover .edit-name-btn {
            opacity: 1;
        }

        .edit-name-btn:hover {
            color: #FF4000;
        }

        .player-title-input {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            background: #191B23;
            border: 1px solid #FF4000;
            border-radius: 8px;
            padding: 4px 10px;
            outline: none;
            width: 100%;
            font-family: inherit;
            display: none;
        }

        .player-header-right {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            gap: 12px;
            flex-shrink: 0;
        }

        .btn-share {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 14px;
            height: 36px;
            background: #FF4000;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.02em;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-share:hover:not(:disabled):not(.processing):not(.done) {
            background: #CC2B02;
        }

        .btn-share:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .btn-share:active:not(:disabled) {
            transform: scale(0.97);
        }

        .btn-share.processing {
            background: #FF7E32;
            pointer-events: none;
        }

        .btn-share.done {
            background: #007657;
            pointer-events: none;
        }

        .btn-share .material-icons-round {
            font-size: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        /* ── Split download button ── */
        .download-split {
            position: relative;
            display: flex;
            align-items: center;
            height: 36px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: visible;
            transition: border-color 0.15s;
        }

        .download-split:hover {
            border-color: rgba(255, 255, 255, 0.35);
        }

        .download-split.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .download-split.downloading {
            border-color: rgba(255, 255, 255, 0.15);
            pointer-events: none;
        }

        .download-split.downloading .download-main {
            color: rgba(255, 255, 255, 0.5);
        }

        .download-split.downloading .download-chevron,
        .download-split.downloading .download-divider {
            opacity: 0.3;
            pointer-events: none;
        }

        .download-split.downloaded {
            border-color: #007657;
            pointer-events: none;
        }

        .download-split.downloaded .download-main {
            color: #00B686;
        }

        .download-split.downloaded .download-chevron,
        .download-split.downloaded .download-divider {
            opacity: 0.3;
        }

        .download-main {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
            height: 100%;
            background: none;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: -0.02em;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
            border-radius: 9px 0 0 9px;
        }

        .download-main:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .download-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.15);
            flex-shrink: 0;
        }

        .download-chevron {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 100%;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            border-radius: 0 9px 9px 0;
        }

        .download-chevron:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }

        .download-menu {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            min-width: 180px;
            background: #1B1B23;
            border: 1px solid #44454E;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            padding: 4px;
            opacity: 0;
            transform: translateY(-4px);
            pointer-events: none;
            transition: opacity 0.15s ease, transform 0.15s ease;
            z-index: 100;
        }

        .download-menu.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .download-menu-item {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 8px 10px;
            background: none;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-family: inherit;
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            transition: background 0.12s;
            white-space: nowrap;
        }

        .download-menu-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .download-menu-item .material-icons-round {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* ── Video player ── */
        .video-player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            min-height: 0;
            overflow: hidden;
        }

        .video-player-section {
            flex: 4;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        video {
            width: 100%;
            flex: 1;
            min-height: 0;
            object-fit: contain;
            object-position: top;
        }

        .video-bottom-section {
            flex: 1;
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            color: #969696;
            padding: 40px 20px;
            font-size: 14px;
        }

        .empty-state-player {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: #525252;
            font-size: 14px;
            gap: 8px;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%) translateY(-12px) scale(0.97);
            display: flex;
            align-items: center;
            padding: 8px 10px;
            gap: 4px;
            height: 38px;
            background: #1B1B23;
            border: 1px solid #44454E;
            box-shadow: 0px 1px 2px rgba(0, 0, 0, 0.08);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
        }

        .toast.visible {
            transform: translateX(-50%) translateY(0) scale(1);
            opacity: 1;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        button { cursor: pointer; }
    </style>
</head>

<body>
    <!-- Header -->
    <div class="history-header">
        <div class="header-left">
            <button id="homeBtn" class="icon-btn" title="Close">
                <span class="material-icons-round" style="font-size: 20px;">home</span>
            </button>
            <span class="header-title">Library</span>
        </div>
        <div class="header-right">
            <button id="chatBarBtn" class="btn-secondary">
                <span class="material-icons-round" style="font-size: 16px;">chat_bubble_outline</span>
                <span>Chat with video</span>
            </button>
        </div>
    </div>

    <!-- Content -->
    <div class="history-content">
        <!-- Sidebar -->
        <div class="history-sidebar">
            <div class="sidebar-toolbar">
                <div class="search-bar">
                    <img src="img/search.png" alt="Search" />
                    <input type="text" id="searchInput" placeholder="Search recordings..." />
                </div>
                <div class="sort-dropdown-wrap">
                    <button class="sort-btn" id="sortBtn">
                        <span id="sortLabel">Newest</span>
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 8 10 12.5 14 8"/>
                        </svg>
                    </button>
                    <div class="sort-dropdown" id="sortDropdown">
                        <!-- Date -->
                        <div class="sort-section">
                            <div class="sort-section-header">Date</div>
                            <div class="sort-options">
                                <button class="sort-option active" data-sort="date-newest">
                                    <span class="sort-radio"></span>
                                    <span class="sort-option-label">Newest First</span>
                                </button>
                                <button class="sort-option" data-sort="date-oldest">
                                    <span class="sort-radio"></span>
                                    <span class="sort-option-label">Oldest First</span>
                                </button>
                            </div>
                        </div>
                        <!-- Duration -->
                        <div class="sort-section">
                            <div class="sort-section-header">Duration</div>
                            <div class="sort-options">
                                <button class="sort-option disabled" data-sort="duration-longest">
                                    <span class="sort-radio"></span>
                                    <span class="sort-option-label">Longest First</span>
                                </button>
                                <button class="sort-option disabled" data-sort="duration-shortest">
                                    <span class="sort-radio"></span>
                                    <span class="sort-option-label">Shortest First</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="video-list" id="videoListContainer"></div>
        </div>

        <!-- Player -->
        <div class="player-container">
            <div class="player-header" id="playerHeader" style="display:none;">
                <div class="player-header-left" id="playerHeaderLeft">
                    <span class="player-title" id="playerTitle"></span>
                    <button class="edit-name-btn" id="editNameBtn">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#969696" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11.33 2a1.89 1.89 0 0 1 2.67 2.67L5.33 13.33 2 14l.67-3.33L11.33 2z"/>
                        </svg>
                    </button>
                    <input type="text" class="player-title-input" id="playerTitleInput" maxlength="100" style="display:none" />
                </div>
                <div class="player-header-right">
                    <div class="download-split disabled" id="downloadSplit">
                        <button class="download-main" id="downloadBtn">
                            <span class="material-icons-round" id="downloadBtnIcon" style="font-size: 16px;">download</span>
                            <span id="downloadBtnLabel">Download</span>
                        </button>
                        <span class="download-divider"></span>
                        <button class="download-chevron" id="downloadChevronBtn">
                            <span class="material-icons-round" style="font-size: 18px;">expand_more</span>
                        </button>
                        <div class="download-menu" id="downloadMenu">
                            <button class="download-menu-item" id="downloadVideoBtn">
                                <span class="material-icons-round">videocam</span>
                                <span>Download Video</span>
                            </button>
                            <button class="download-menu-item" id="downloadTranscriptBtn">
                                <span class="material-icons-round">description</span>
                                <span>Download Transcript</span>
                            </button>
                        </div>
                    </div>
                    <button class="btn-share" id="shareBtn" disabled>
                        <span class="material-icons-round" id="shareBtnIcon">link</span>
                        <span id="shareBtnLabel">Copy Link</span>
                    </button>
                </div>
            </div>

            <div class="video-player-area" id="videoPlayerArea">
                <div class="video-player-section">
                    <video id="historyVideoPlayer" controls playsinline>
                        <p style="color: #fff;">Video playback not supported</p>
                    </video>
                </div>
                <div class="video-bottom-section"></div>
            </div>

            <!-- Empty state when no recording selected -->
            <div class="empty-state-player" id="emptyPlayer">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#525252" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                <span>Select a recording to play</span>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="material-icons-round" style="font-size: 20px; color: #fff;">check</span>
        <span id="toastMessage">Link copied to clipboard</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="history.js" type="module"></script>
</body>

</html>
