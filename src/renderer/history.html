<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Recording History</title>
    <style>
        :root {
            --bg-primary: #141416;
            --bg-secondary: #1c1c1f;
            --bg-surface: #232327;
            --bg-hover: #2a2a2f;
            --border: #2a2a2e;
            --border-light: #333338;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;
            --radius: 8px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Nav */
        .history-nav {
            padding: 14px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            -webkit-app-region: drag;
        }

        .history-nav h2 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .nav-btn {
            -webkit-app-region: no-drag;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.15s, background 0.15s;
        }

        .nav-btn:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        /* Layout */
        .history-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .history-sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .history-list-header {
            padding: 14px 16px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        #historyListContainer {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .history-group-header {
            padding: 10px 8px 4px;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .history-item {
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.15s;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: var(--bg-hover);
        }

        .history-item.active {
            background: var(--bg-surface);
            border-color: var(--border-light);
        }

        .history-item-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .history-item-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Status badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .status-recording .status-dot { background: var(--error); animation: pulse 1.5s ease-in-out infinite; }
        .status-recording { color: var(--error); background: rgba(239, 68, 68, 0.1); }

        .status-pending .status-dot { background: var(--warning); animation: pulse 2s ease-in-out infinite; }
        .status-pending { color: var(--warning); background: rgba(245, 158, 11, 0.1); }

        .status-processing .status-dot { background: var(--info); animation: pulse 2s ease-in-out infinite; }
        .status-processing { color: var(--info); background: rgba(59, 130, 246, 0.1); }

        .status-ready .status-dot { background: var(--success); }
        .status-ready { color: var(--success); background: rgba(34, 197, 94, 0.08); }

        .status-failed .status-dot { background: var(--error); }
        .status-failed { color: var(--error); background: rgba(239, 68, 68, 0.1); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        /* Main area */
        .history-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        /* Video header */
        .video-header {
            padding: 14px 20px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .video-title-group {
            flex: 1;
            min-width: 0;
        }

        .video-title-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .video-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .edit-name-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 3px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s;
        }

        .video-title-row:hover .edit-name-btn {
            opacity: 1;
        }

        .edit-name-btn:hover {
            color: var(--accent);
        }

        .video-title-input {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            background: var(--bg-surface);
            border: 1px solid var(--accent);
            border-radius: 6px;
            padding: 4px 8px;
            outline: none;
            width: 100%;
            font-family: inherit;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .share-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
            white-space: nowrap;
        }

        .share-btn:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .share-btn:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .share-btn:active:not(:disabled) {
            transform: scale(0.97);
        }

        .spinner-small {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Player */
        .history-player-container {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }

        video {
            width: 100%;
            height: 100%;
            max-height: 100%;
        }

        /* Transcript panel */
        .transcript-panel {
            height: 220px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .transcript-header {
            padding: 10px 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 1px solid var(--border);
        }

        .transcript-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
            font-size: 13px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(40px);
            background: var(--bg-surface);
            color: var(--text-primary);
            padding: 10px 18px;
            border-radius: var(--radius);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-light);
            opacity: 0;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 1000;
        }

        .toast.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #3a3a3f;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4a4a4f;
        }

        /* Material Icons */
        .material-icons {
            font-family: 'Material Icons';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }

        button { cursor: pointer; }
    </style>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body>
    <div class="history-nav">
        <button id="closeHistoryBtn" class="nav-btn" title="Close">
            <span class="material-icons" style="font-size: 20px;">arrow_back</span>
        </button>
        <h2>Recordings</h2>
        <div style="flex:1;"></div>
        <button id="refreshBtn" class="nav-btn" title="Refresh">
            <span class="material-icons" style="font-size: 20px;">refresh</span>
        </button>
    </div>

    <div class="history-content">
        <!-- Sidebar -->
        <div class="history-sidebar">
            <div class="history-list-header">Library</div>
            <div id="historyListContainer"></div>
        </div>

        <!-- Main -->
        <div class="history-main">
            <!-- Video Header -->
            <div class="video-header" id="videoHeader" style="display:none;">
                <div class="video-title-group">
                    <div class="video-title-row" id="videoTitleRow">
                        <span class="video-title" id="currentVideoTitle">Select a video</span>
                        <button class="edit-name-btn" id="editNameBtn" title="Rename">
                            <span class="material-icons" style="font-size: 14px;">edit</span>
                        </button>
                    </div>
                    <input type="text" class="video-title-input" id="videoTitleInput" style="display:none;" maxlength="100" />
                    <div id="videoStatusBadge" style="margin-top: 6px;"></div>
                </div>
                <div class="header-right">
                    <button class="share-btn" id="shareBtn" disabled>
                        <span class="material-icons" style="font-size: 16px;">link</span>
                        <span id="shareBtnLabel">Share</span>
                    </button>
                </div>
            </div>

            <!-- Player -->
            <div class="history-player-container">
                <video id="historyVideoPlayer" controls playsinline>
                    <p style="color: #fff;">Video playback not supported</p>
                </video>
            </div>

            <!-- Transcript -->
            <div class="transcript-panel">
                <div class="transcript-header">Transcript</div>
                <div class="transcript-body" id="insightsContent">
                    <div class="empty-state">Select a recording to view details.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="material-icons" style="color: var(--success); font-size: 18px;">check_circle</span>
        <span id="toastMessage">Link copied to clipboard</span>
    </div>

    <script src="history.js" type="module"></script>
</body>

</html>
