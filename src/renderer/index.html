<!DOCTYPE html>
<html data-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>Bloom</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ===========================================
           Theme Variables
           =========================================== */
        :root, [data-theme="dark"] {
            --bar-bg: rgba(22, 22, 24, 0.95);
            --bar-bg-recording: rgba(20, 20, 20, 0.95);
            --bar-text: #f7f7f7;
            --bar-text-muted: #969696;
            --bar-text-active: rgba(255, 255, 255, 0.9);
            --bar-divider: rgba(255, 255, 255, 0.1);
            --bar-grip-dot: rgba(255, 255, 255, 0.2);
            --bar-hover: rgba(255, 255, 255, 0.06);
            --bar-input-bg: rgba(255, 255, 255, 0.08);
            --bar-input-border: rgba(255, 255, 255, 0.15);
            --bar-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --bar-tooltip-bg: rgba(0, 0, 0, 0.85);
            --bar-tooltip-text: #e0e0e0;
            --bar-tooltip-shadow: none;
            --bar-icon-off: brightness(0) invert(0.6);
            --bar-icon-on: brightness(0) invert(1);
        }

        [data-theme="light"] {
            --bar-bg: rgba(245, 245, 247, 0.92);
            --bar-bg-recording: rgba(240, 240, 242, 0.95);
            --bar-text: #1d1d1f;
            --bar-text-muted: #86868b;
            --bar-text-active: rgba(29, 29, 31, 0.9);
            --bar-divider: rgba(0, 0, 0, 0.1);
            --bar-grip-dot: rgba(0, 0, 0, 0.5);
            --bar-hover: rgba(0, 0, 0, 0.05);
            --bar-input-bg: rgba(0, 0, 0, 0.05);
            --bar-input-border: rgba(0, 0, 0, 0.15);
            --bar-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            --bar-tooltip-bg: rgba(255, 255, 255, 0.95);
            --bar-tooltip-text: #1d1d1f;
            --bar-tooltip-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
            --bar-icon-off: brightness(0) invert(0.4);
            --bar-icon-on: brightness(0);
        }

        /* ===========================================
           Reset & Base
           =========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background: transparent;
            overflow: hidden;
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--bar-text);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        button, input {
            -webkit-app-region: no-drag;
        }

        /* ===========================================
           Floating Bar
           =========================================== */
        .floating-bar {
            -webkit-app-region: drag;
            display: inline-flex;
            align-items: center;
            padding: 8px 8px;
            gap: 6px;
            height: 52px;
            margin: 0 auto 28px;
            background: var(--bar-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: none;
            border-radius: 14px;
            box-shadow: var(--bar-shadow);
            transition: all 0.3s ease;
        }

        /* ===========================================
           Close Button
           =========================================== */
        /* Shared style for standalone icon buttons (close, library) */
        .bar-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            padding: 0;
            margin: 0 -2px;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .bar-action-btn img {
            width: 18px !important;
            height: 18px !important;
            max-width: 18px;
            max-height: 18px;
            filter: var(--bar-icon-off);
            transition: filter 0.2s;
        }

        .bar-action-btn:hover img {
            filter: var(--bar-icon-on);
        }

        /* ===========================================
           Drag Grip
           =========================================== */
        .bar-grip {
            display: grid;
            grid-template-columns: repeat(2, 4px);
            grid-template-rows: repeat(3, 4px);
            gap: 3px;
            padding: 4px 2px;
            cursor: grab;
            flex-shrink: 0;
        }

        .bar-grip:active {
            cursor: grabbing;
        }

        .bar-grip .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--bar-grip-dot);
        }

        /* ===========================================
           Divider
           =========================================== */
        .bar-divider {
            width: 1px;
            height: 28px;
            background: var(--bar-divider);
            flex-shrink: 0;
        }

        /* ===========================================
           Source Toggle Pills
           =========================================== */
        .bar-sources {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .source-pill {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            gap: 6px;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            transition: background 0.3s;
            flex-shrink: 0;
            font-family: inherit;
        }

        .source-pill:hover {
            background: var(--bar-hover);
        }

        .source-pill .source-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            filter: var(--bar-icon-off);
            transition: filter 0.2s;
        }

        .source-pill.active .source-icon {
            filter: var(--bar-icon-on);
        }

        .source-pill .source-label {
            font-size: 12.5px;
            font-weight: 450;
            line-height: 1;
            letter-spacing: -0.02em;
            color: var(--bar-text-muted);
            white-space: nowrap;
            display: inline-block;
            width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: left;
            transition: color 0.2s;
        }

        .source-pill.active .source-label {
            color: var(--bar-text-active);
        }

        .source-pill.disabled {
            opacity: 0.4;
            cursor: default;
            pointer-events: none;
        }

        /* ===========================================
           Display Selector
           =========================================== */
        .display-pill {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            gap: 6px;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
            font-family: inherit;
        }

        .display-pill:hover {
            background: var(--bar-hover);
        }

        .display-pill .source-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            filter: var(--bar-icon-on);
        }

        .display-pill .display-label {
            font-size: 12.5px;
            font-weight: 450;
            line-height: 1;
            letter-spacing: -0.02em;
            color: var(--bar-text-active);
            white-space: nowrap;
            display: inline-block;
            width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: left;
        }

        .display-pill .chevron-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            color: var(--bar-text-active);
            transition: transform 0.2s;
        }

        .display-selector.open .chevron-icon {
            transform: rotate(180deg);
        }

        /* ===========================================
           Display Dropdown (opens upward)
           =========================================== */
        .display-selector {
            position: relative;
            flex-shrink: 0;
        }

        /* ===========================================
           Record / Stop Buttons
           =========================================== */
        .record-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px 16px;
            gap: 4px;
            height: 34px;
            border: none;
            border-radius: 8px;
            background: #FF4000;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            line-height: 1;
            letter-spacing: -0.02em;
            color: #fff;
            white-space: nowrap;
            transition: background 0.15s;
            flex-shrink: 0;
            box-shadow: 0 1px 8px rgba(255, 64, 0, 0.15);
        }

        .record-btn:hover:not(:disabled) {
            background: #CC2B02;
        }

        .record-btn:active:not(:disabled) {
            background: #CC2B02;
        }

        .record-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .record-btn.loading {
            pointer-events: none;
            background: #D4A017;
            box-shadow: 0 1px 8px rgba(212, 160, 23, 0.15);
        }

        .record-btn .btn-spinner {
            display: none;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        .record-btn.loading .btn-spinner {
            display: block;
        }

        /* Stop Recording Button */
        .stop-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 8px;
            background: #FF4000;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s;
            -webkit-app-region: no-drag;
            position: relative;
        }

        .stop-btn:hover {
            background: #CC2B02;
        }

        .stop-icon {
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 2px;
        }


        /* ===========================================
           Status Badge (visible during recording)
           =========================================== */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.15);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .status-badge .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
            animation: pulse 1s infinite;
        }


        /* ===========================================
           Rename Row (inline, shown after recording)
           =========================================== */
        .bar-rename {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            min-width: 0;
        }

        .rename-input {
            flex: 1;
            min-width: 0;
            padding: 6px 10px;
            background: var(--bar-input-bg);
            border: 1px solid var(--bar-input-border);
            border-radius: 8px;
            color: var(--bar-text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .rename-input:focus {
            border-color: #FF4000;
        }

        .rename-input::placeholder {
            color: var(--bar-text-muted);
        }

        .rename-save {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FF4000;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            flex-shrink: 0;
            font-size: 14px;
            transition: filter 0.2s;
        }

        .rename-save:hover {
            filter: brightness(1.1);
        }


        /* ===========================================
           Recording State
           =========================================== */
        .floating-bar.recording {
            padding: 8px 10px;
            gap: 8px;
            height: 52px;
            border-radius: 14px;
            background: var(--bar-bg-recording);
            border: none;
            box-shadow: var(--bar-shadow);
        }

        .floating-bar.recording #btn-close,
        .floating-bar.recording #btn-start-session,
        .floating-bar.recording #renameRow,
        .floating-bar.recording #btn-library,
        .floating-bar.recording #libraryDivider {
            display: none;
        }

        /* Source pills: icon-only in recording */
        .floating-bar.recording .source-label {
            display: none;
        }

        .floating-bar.recording .source-pill {
            padding: 6px;
            gap: 0;
            height: 36px;
            width: 36px;
            justify-content: center;
            border-radius: 8px;
        }

        .floating-bar.recording .source-pill .source-icon {
            width: 18px;
            height: 18px;
        }

        .floating-bar.recording .source-pill.disabled {
            opacity: 1;
            pointer-events: auto;
            cursor: pointer;
        }

        /* Display pill: icon-only in recording (hide label, chevron) */
        .floating-bar.recording .display-label,
        .floating-bar.recording .chevron-icon {
            display: none !important;
        }

        .floating-bar.recording .display-pill {
            padding: 6px;
            gap: 0;
            height: 36px;
            width: 36px;
            justify-content: center;
            border-radius: 8px;
        }

        .floating-bar.recording .display-pill .source-icon {
            width: 18px;
            height: 18px;
            transition: filter 0.2s;
        }

        .floating-bar.recording .display-pill:not(.active) .source-icon {
            filter: var(--bar-icon-off);
        }

        /* Status badge: left side with timer */
        .floating-bar.recording #statusBadge {
            order: -1;
        }

        .floating-bar.recording .status-badge {
            background: none;
            padding: 0 4px;
            gap: 6px;
            color: #FD5337;
            font-size: 14px;
            font-weight: 600;
        }

        .floating-bar.recording .status-dot {
            width: 8px;
            height: 8px;
        }

        .floating-bar.recording .bar-divider {
            height: 32px;
        }

        /* Recording action buttons */
        .bar-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            transition: opacity 0.2s;
            padding: 0;
        }

        .bar-action-btn:hover {
            opacity: 0.8;
        }

        .bar-action-btn img {
            width: 32px;
            height: 32px;
        }

        .bar-action-btn svg {
            width: 18px;
            height: 18px;
        }

        .bar-action-btn.disabled {
            opacity: 0.25;
            cursor: default;
            pointer-events: none;
        }

        /* ===========================================
           Animations
           =========================================== */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===========================================
           Tooltips
           =========================================== */
        [data-tooltip] {
            position: relative;
        }

        [data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            padding: 4px 8px;
            background: var(--bar-tooltip-bg);
            color: var(--bar-tooltip-text);
            box-shadow: var(--bar-tooltip-shadow);
            font-size: 11px;
            font-weight: 500;
            line-height: 1.3;
            white-space: nowrap;
            border-radius: 6px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            -webkit-app-region: no-drag;
        }

        [data-tooltip]:hover::after {
            opacity: 1;
        }

        /* ===========================================
           Utility
           =========================================== */
        .hidden { display: none !important; }
    </style>
</head>

<body>
    <div id="mainApp" class="floating-bar">

        <!-- Drag Grip -->
        <div class="bar-grip">
            <span class="dot"></span><span class="dot"></span>
            <span class="dot"></span><span class="dot"></span>
            <span class="dot"></span><span class="dot"></span>
        </div>

        <!-- Close Button -->
        <button id="btn-close" class="bar-action-btn" data-tooltip="Hide bar">
            <img src="img/cancel.png" alt="Close" width="14" height="14">
        </button>

        <div class="bar-divider"></div>

        <!-- Source Toggles -->
        <div class="bar-sources">
            <button id="toggle-camera" class="source-pill" data-source="camera" data-tooltip="Camera">
                <img class="source-icon" src="img/camera_off.png" data-off="img/camera_off.png" data-on="img/camera_on.png" width="16" height="16" alt="">
                <span class="source-label" data-off="No camera" data-on="Camera">No camera</span>
            </button>
            <button id="toggle-mic" class="source-pill" data-source="mic" data-tooltip="Microphone">
                <img class="source-icon" src="img/mic_off.png" data-off="img/mic_off.png" data-on="img/mic_on.png" width="16" height="16" alt="">
                <span class="source-label" data-on="Mic">loading...</span>
            </button>
            <button id="toggle-audio" class="source-pill" data-source="audio" data-tooltip="System Audio">
                <img class="source-icon" src="img/audio_off.png" data-off="img/audio_off.png" data-on="img/audio_on.png" width="16" height="16" alt="">
                <span class="source-label" data-on="Audio">loading...</span>
            </button>
        </div>

        <div class="bar-divider"></div>

        <!-- Display Selector -->
        <div id="displaySelector" class="display-selector">
            <button id="toggle-screen" class="display-pill" data-tooltip="Screen">
                <img class="source-icon" src="img/screen_on.png" data-on="img/screen_on.png" data-off="img/screen_off.png" width="16" height="16" alt="">
                <span id="displayLabel" class="display-label">Select display</span>
                <svg class="chevron-icon" width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <!-- Status Badge (hidden default, shown during recording) -->
        <div id="statusBadge" class="status-badge hidden">
            <div class="status-dot"></div>
            <span id="statusText">Ready</span>
        </div>

        <!-- Record / Stop / Delete -->
        <button id="btn-start-session" class="record-btn">
            <div class="btn-spinner"></div>
            <span class="btn-label">Start Recording</span>
        </button>
        <button id="btn-stop-session" class="stop-btn hidden" data-tooltip="Stop Recording">
            <span class="stop-icon"></span>
        </button>
        <!-- Rename Row (hidden, shown after recording stops) -->
        <div id="renameRow" class="bar-rename hidden">
            <input type="text" id="renameInput" class="rename-input" placeholder="Name this recording..." maxlength="100">
            <button id="renameSaveBtn" class="rename-save" data-tooltip="Save">&#10003;</button>
        </div>

        <div id="libraryDivider" class="bar-divider"></div>

        <!-- Library Button -->
        <button id="btn-library" class="bar-action-btn" data-tooltip="Library">
            <img src="img/library.png" alt="Library" width="14" height="14">
        </button>

    </div>



    <script type="module" src="./renderer.js"></script>
</body>

</html>
